name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libraries for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: mypy
        run: mypy

      - name: pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build-windows:
    runs-on: windows-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Windows executable
        run: pyinstaller --distpath dist --workpath build packaging/simple-pomodoro.spec

      - name: Smoke-test the executable
        shell: pwsh
        run: |
          if (-not (Test-Path dist/simple-pomodoro.exe)) {
            throw "executable was not produced"
          }
          # オフスクリーンで起動し、すぐ終了させてクラッシュしないことを確認する。
          $env:QT_QPA_PLATFORM = "offscreen"
          $p = Start-Process -FilePath dist/simple-pomodoro.exe -PassThru
          Start-Sleep -Seconds 5
          if ($p.HasExited) {
            throw "executable exited early with code $($p.ExitCode)"
          }
          Stop-Process -Id $p.Id -Force

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: simple-pomodoro-windows
          path: dist/simple-pomodoro.exe
